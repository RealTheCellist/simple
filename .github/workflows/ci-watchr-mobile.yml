name: CI - WATCHR Mobile

on:
  push:
    branches: [main, master]
    paths:
      - "watchr-mobile/**"
      - ".github/workflows/ci-watchr-mobile.yml"
  pull_request:
    paths:
      - "watchr-mobile/**"
      - ".github/workflows/ci-watchr-mobile.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watchr-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: watchr-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
