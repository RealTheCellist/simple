name: CI - WATCHR Quant Lab

on:
  push:
    branches: [main, master]
    paths:
      - "watchr-quant-lab/**"
      - ".github/workflows/ci-watchr-quant-lab.yml"
  pull_request:
    paths:
      - "watchr-quant-lab/**"
      - ".github/workflows/ci-watchr-quant-lab.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watchr-quant-lab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: watchr-quant-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run sample backtest
        run: npm run run -- --days=252 --seed=42 --stressRuns=10 --out=reports/ci-report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchr-quant-lab-report
          path: watchr-quant-lab/reports/ci-report.json
