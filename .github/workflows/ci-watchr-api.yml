name: CI - WATCHR API

on:
  push:
    branches: [main, master]
    paths:
      - "watchr-api/**"
      - ".github/workflows/ci-watchr-api.yml"
  pull_request:
    paths:
      - "watchr-api/**"
      - ".github/workflows/ci-watchr-api.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watchr-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: watchr-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Docker image
        run: docker build -t watchr-api-ci .
