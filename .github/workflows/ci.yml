name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "watchr-web/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "watchr-web/**"
      - ".github/workflows/ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watchr-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: watchr-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchr-web-dist
          path: watchr-web/dist
