name: CI - WATCHR OPS

on:
  push:
    branches: [main, master]
    paths:
      - "watchr-ops/**"
      - ".github/workflows/ci-watchr-ops.yml"
  pull_request:
    paths:
      - "watchr-ops/**"
      - ".github/workflows/ci-watchr-ops.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watchr-ops
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: watchr-ops/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke check dist
        run: npm run check:smoke

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchr-ops-dist
          path: watchr-ops/dist
